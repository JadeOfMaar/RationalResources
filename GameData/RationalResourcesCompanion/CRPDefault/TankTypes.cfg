// Add secondary tank types without CryoTanks.
@PART:HAS[@MODULE[ModuleB9PartSwitch]]:NEEDS[B9PartSwitch,CommunityResourcePack,!RationalResourcesNoCRP,!CryoTanks]:AFTER[RationalResourcesSquad]
{
	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[RRStockSwitch]]
	{
		SUBTYPE
		{
			name = LNH3
			tankType = RR_CryoA
			title = LqdAmmonia
		}
		SUBTYPE
		{
			name = LNH3LOX
			tankType = RR_CryoALOX
			title = Ammonia + Oxidizer
		}
		SUBTYPE
		{
			name = LCO2
			tankType = RR_CryoC
			title = LqdCO2
		}
		SUBTYPE
		{
			name = LCO
			tankType = RR_CryoCM
			title = LqdCO
		}
		SUBTYPE
		{
			name = LCOLOX
			tankType = RR_CryoCMLOX
			title = LqdCO + Oxidizer
		}
  		SUBTYPE
		{
			name = LFL2
			tankType = RR_CryoF2
			title = LqdFluorine
		}
		SUBTYPE
		{
			name = HLOX
			tankType = RR_CryoHLOX
			title = Hydrolox
		}
		SUBTYPE
		{
			name = LH2
			tankType = RR_CryoH
			title = LqdHydrogen
		}
		SUBTYPE
		{
			name = LFF2
			tankType = RR_CryoLFF2
			title = LiquidFuel + LqdFluorine
		}
  		SUBTYPE
		{
			name = HF2
			tankType = RR_CryoHF2
			title = LqdHydrogen + LqdFluorine
		}
		SUBTYPE
		{
			name = MF2
			tankType = RR_CryoMF2
			title = LqdMethane + LqdFluorine
		}
		SUBTYPE
		{
			name = AF2
			tankType = RR_CryoAF2
			title = LqdAmmonia + LqdFluorine
		}
		%SUBTYPE[Methalox] // LCH4
		{
			%tankType = RR_CryoMLOX
			%title = Methalox
		}
		%SUBTYPE[Methane] // MLOX
		{
			%tankType = RR_CryoM
			%title = LqdMethane
		}
		SUBTYPE
		{
			name = LN2
			tankType = RR_CryoN
			title = LqdNitrogen
		}
		SUBTYPE
		{
			name = LOX
			tankType = RR_CryoO
			title = LqdOxygen
		}
		SUBTYPE
		{
			name = Water
			tankType = RR_Water
			title = Water
		}
		SUBTYPE:NEEDS[RationalResourcesAluminium]
		{
			name = Aluminium
			tankType = RR_Aluminium
			title = Aluminium
		}
		SUBTYPE:NEEDS[NearFuturePropulsion]
		{
			name = LI
			tankType = RR_Lithium
			title = Lithium
		}
		SUBTYPE:NEEDS[NearFuturePropulsion]
		{
			name = AR
			tankType = RR_GasArgon
			title = ArgonGas
		}
		SUBTYPE:NEEDS[NearFuturePropulsion]
		{
			name = XE
			tankType = RR_GasXenon
			title = XenonGas
		}
	}
}

