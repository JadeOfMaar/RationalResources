@PART[RREngineFOOF*]:NEEDS[StockWaterfallEffects]
{
	@EFFECTS
	{
		@running_closed
		{
			!MODEL_MULTI_PARTICLE,* {}
		}
		@running_open
		{
			!MODEL_MULTI_PARTICLE,* {}
		}
	}
	MODULE
	{
		name = ModuleWaterfallFX
		moduleID = #$/MODULE[ModuleEnginesFX]/engineID$
		CONTROLLER
		{
			name = atmosphereDepth
			linkedTo = atmosphere_density
		}
		CONTROLLER
		{
			name = throttle
			linkedTo = throttle
			engineID = #$/MODULE[ModuleEnginesFX]/engineID$
		}
		CONTROLLER
		{
			name = random
			linkedTo = random
			range = 0.7, 1
		}
		TEMPLATE
		{
			templateName = stock-methalox-upper-2
			overrideParentTransform = thrustTransform
			scale = 0.35, 0.35, 0.35
			rotation = 0, 0, 0
			position = 0, 0, -0.08
		}
	}
}

