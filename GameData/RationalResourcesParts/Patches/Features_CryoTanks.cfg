	MODULE:NEEDS[SystemHeat]
	{
		name = ModuleSystemHeat
		volume = #$../mass$
		@volume *= 0.5
		moduleID = tank
		iconName = Icon_Snow
	}
	MODULE:NEEDS[SystemHeat,CommunityResourcePack]
	{
		name = ModuleSystemHeatCryoTank
		systemHeatModuleID = tank
		BOILOFFCONFIG
		{
			FuelName = LqdAmmonia
			BoiloffRate = 0.0035
			CoolingHeatCost = 0.033
			CryocoolerTemperature = 500
		}
		BOILOFFCONFIG
		{
			FuelName = LqdCO
			BoiloffRate = 0.04
			CoolingHeatCost = 0.133
			CryocoolerTemperature = 400
		}
