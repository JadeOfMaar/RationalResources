			tankType = RR_CryoHF2
			title = LqdHydrogen + LqdFluorine
		}
		SUBTYPE
		{
			name = MF2
			tankType = RR_CryoMF2
			title = LqdMethane + LqdFluorine
		}
		SUBTYPE
		{
			name = AF2
