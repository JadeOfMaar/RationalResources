			tankType = RR_CryoD
			title = LqdDeuterium
		}
		SUBTYPE
		{
			name = Helium3
			tankType = RR_CryoHe
			title = LqdHe3
		}
		SUBTYPE
		{
			name = D/He3
			tankType = RR_CryoDHe
			title = LqdDeuterium + LqdHe3
		}
		SUBTYPE
		{
			name = FusionPellets
			title = FusionPellets
			primaryColor = PowderBlue
			secondaryColor = CloudyBlue
			RESOURCE
			{
				name = FusionPellets
				unitsPerVolume = 5
			}
		}
