		{
			FuelName = LqdCO2
			BoiloffRate = 0.005
			CoolingHeatCost = 0.05
			CryocoolerTemperature = 500
		}
		BOILOFFCONFIG
		{
			FuelName = LqdDeuterium
			BoiloffRate = 0.05
			CoolingHeatCost = 0.267
			CryocoolerTemperature = 300
		}
		BOILOFFCONFIG
		{
			FuelName = LqdFluorine
			BoiloffRate = 0.04
			CoolingHeatCost = 0.1
