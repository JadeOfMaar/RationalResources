// CSR


@PART[RRTankStackCryo*]:NEEDS[B9PartSwitch,RationalResources,ClassicStock,!CommunityResourcePack]
{
	MODULE
	{
		name = ModuleB9PartSwitch
		moduleID = RRFuelSwitch
		baseVolume = #$/refVolume$
		switcherDescription = RR Fuel Option
		switcherDescriptionPlural = RR Fuel Options
		switchInFlight = True
		SUBTYPE
		{
			name = Structural
			title = Structural
		}
		SUBTYPE
		{
			name = Hexagen
			tankType = RR_HEX
			title = Hexagen
			primaryColor = Grapefruit
			secondaryColor = Grapefruit
		}
		SUBTYPE
		{
			name = Oxium
			tankType = RR_OXM
			title = Oxium
			primaryColor = ResourceColorOxidizer
			secondaryColor = ResourceColorOxidizer
		}
		SUBTYPE
		{
			name = Propellium
			tankType = RR_PLM
			title = Propellium
			primaryColor = Lightblue
			secondaryColor = Lightblue
		}
		SUBTYPE
		{
			name = PropLox
			tankType = RR_PLOX
			title = PropLox
			primaryColor = Lightblue
			secondaryColor = ResourceColorOxidizer
		}
		SUBTYPE
		{
			name = Water
			tankType = RR_WTR
			title = Water
			primaryColor = Ocean
			secondaryColor = Ocean
		}
	}
}
