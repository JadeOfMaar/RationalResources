@PART[RREngineNERVA*]:BEFORE[Waterfall]
{
	@MODULE[ModuleEnginesFX]
	{
		@runningEffectName = fx-nerv-running
	}
	@EFFECTS
	{
		!running {}
		fx-nerv-running
		{
			AUDIO
			{
				channel = Ship
				clip = sound_rocket_hard
				volume = 0.0 0.0
				volume = 1.0 1.0
				pitch = 0.0 0.2
				pitch = 1.0 1.0
				loop = true
			}
			MODEL_MULTI_PARTICLE
			{
				name = turbo
				modelName = ReStock/FX/restock-fx-nerv-turbo-1
				transformName = fxTransformTurbo
				emission = 0.0 0.0
				emission = 0.01 0.1
				emission = 0.075 0.25
				emission = 1.0 1.0
				speed = 0.0 0.35
				speed = 1.0 1.0
			}
			PREFAB_PARTICLE
			{
				prefabName = fx_smokeTrail_light
				transformName = smokePoint
				emission = 0.0 0.0
				emission = 0.05 0.0
				emission = 0.075 0.25
				emission = 1.0 1.25
				speed = 0.0 0.25
				speed = 1.0 1.0
			}
		}
	}
	MODULE
	{
		name = ModuleWaterfallFX
		moduleID = nervFX
		CONTROLLER
		{
			name = atmosphereDepth
			linkedTo = atmosphere_density
		}
		CONTROLLER
		{
			name = throttle
			linkedTo = throttle
			engineID = #$/MODULE[ModuleEnginesFX],1/engineID$
		}
		CONTROLLER
		{
			name = random
			linkedTo = random
			range = -1,1
		}
		TEMPLATE
		{
			templateName = waterfall-ka-ntr-lh2-1
			overrideParentTransform = thrustTransform
			position = 0,0,0.084
			rotation = 0, 0, 0
			scale = 0.6, 0.6, 0.8
		}
	}
}

@PART[RREngineNTJ1]:BEFORE[RestockWaterfallExpansion]
{
	@MODULE[ModuleEnginesFX]
	{
		%runningEffectName = fx-panther-wet-running
		%spoolEffectName = fx-panther-wet-spool
	}
	@EFFECTS
	{
		!running_wet {}
		!power_wet {}
		fx-panther-wet-spool
		{
			AUDIO
			{
				name = soundWet1
				channel = Ship
				clip = RestockWaterfallExpansion/JetSFX/Sounds/GE404_Afterburner_Low
				volume = 0.0 0.0
				volume = 0.0001 0.65
				volume = 1.0 0.8
				pitch = 0.0 0.3
				pitch = 1.0 1.5
				loop = true
			}
			PREFAB_PARTICLE
			{
				prefabName = fx_smokeTrail_aeroSpike
				transformName = smokePoint
				emission = 0.0 0.0
				emission = 0.05 0.0
				emission = 0.075 0.1
				emission = 1.0 0.6
				speed = 0.0 5.0
				speed = 1.0 10.0
				energy = 0.0 2.0
				energy = 1.0 4.0
				localOffset = 0, 0, 7
			}
		}
		fx-panther-wet-running
		{
			AUDIO
			{
				name = soundWet3
				channel = Ship
				clip = RestockWaterfallExpansion/JetSFX/Sounds/GE404_Afterburner_High
				volume = 0.1 0.0
				volume = 0.3 1.12
				volume = 1.0 1.25
				pitch = 0.0 0.4
				pitch = 1.0 1.0
				loop = true
			}
			AUDIO
			{
				name = soundWet2
				channel = Ship
				clip = RestockWaterfallExpansion/JetSFX/Sounds/GE404_Afterburner_Low
				volume = 0.0 0.0
				volume = 0.0001 0.65
				volume = 1.0 0.8
				pitch = 0.0 0.3
				pitch = 1.0 1.5
				loop = true
			}
		}
		@engage
		{
			@AUDIO
			{
				@clip = RestockWaterfallExpansion/JetSFX/Sounds/GE404_Startup
				@volume = 1.0
				@pitch = 2.2
			}
		}
		@disengage
		{
			@AUDIO
			{
				@clip = RestockWaterfallExpansion/JetSFX/Sounds/GE404_Shutdown
				@volume = 1
				@pitch = 1.8
			}
		}
		@flameout
		{
			@AUDIO
			{
				@clip = RestockWaterfallExpansion/JetSFX/Sounds/GE404_Shutdown
			}
		}
	}
	MODULE
	{
		name = ModuleWaterfallFX
		moduleID = pantherWet
		CONTROLLER
		{
			name = atmosphereDepth
			linkedTo = atmosphere_density
		}
		CONTROLLER
		{
			name = throttle
			linkedTo = throttle
			engineID = #$/MODULE[ModuleEnginesFX],0/engineID$
			responseRateUp = 0.001
			responseRateDown = 0.016
		}
		CONTROLLER
		{
			name = mach
			linkedTo = mach
		}
		TEMPLATE
		{
			templateName = stock-kerozine-afterburner
			overrideParentTransform = thrustTransform
			position = 0,0,0
			rotation = 0, 0, 0
			scale = 1, 1, 1
		}
	}
}