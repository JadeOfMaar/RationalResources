	@SHPower1 = #$SHPower1[0,.]$ // regex truncate, unknown behavior but used in RO
	@SHPower1 /= 100
	
	SHPower2 = #$SHPower1$
	SHPower3 = #$SHPower1$
	SHPower4 = #$SHPower1$
	SHPower5 = #$SHPower1$
	SHPower6 = #$SHPower1$
	SHPower7 = #$SHPower1$
	SHPower8 = #$SHPower1$
	@SHPower2 *= 0.5
	@SHPower3 *= 0.3334
	@SHPower4 *= 0.25
	@SHPower5 *= 0.2
	@SHPower6 *= 0.1667
	@SHPower7 *= 0.1429
